name: Deploy PHP Backend to API Folder

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-php:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Crea el ZIP excluyendo archivos sensibles y de git
      # config/config.local.php contiene credenciales reales del server
      # y vive SOLO en Ferozo (subido manual una vez por FTP).
      - name: Create deployment ZIP
        run: |
          zip -r deploy.zip . \
            -x "config/config.local.php" \
            -x "config/config.local.example.php" \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "deploy.zip" \
            -x "error_log" \
            -x "*.log" \
            -x "test_connection.php" \
            -x "public/img/*"

      # 3. Mueve el zip a una carpeta limpia para subir
      - name: Prepare artifact
        run: |
          mkdir upload_dir
          mv deploy.zip upload_dir/

      # 4. Sube SOLO el zip a la carpeta /public_html/api/
      - name: Deploy ZIP to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.PANEL_SERVER }}
          username: ${{ secrets.PANEL_USERNAME }}
          password: ${{ secrets.PANEL_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose # DonWeb a veces usa certificados autofirmados en FTP, 'loose' ignora esa validación.
          local-dir: ./upload_dir/
          server-dir: /public_html/nortewalk/api/ # <-- Aquí cambias el destino

      # 5. Dispara la extracción en la nueva URL
      - name: Trigger unzip on server
        run: curl --fail "https://amadamia.com.ar/nortewalk/api/extract.php?secret=${{
          secrets.UNZIP_SECRET }}"
