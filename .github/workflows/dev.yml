name: DEV - Deploy PHP Backend to API Folder

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-php:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Crea el ZIP excluyendo archivos sensibles y de git
      # La opción -x es la clave aquí para ignorar config.php
      - name: Create deployment ZIP
        run: |
          zip -r deploy.zip . -x "config.php" ".git/*" ".github/*" ".gitignore" "deploy.zip" "public/img/*"

      # 3. Mueve el zip a una carpeta limpia para subir
      - name: Prepare artifact
        run: |
          mkdir upload_dir
          mv deploy.zip upload_dir/

      # 4. Sube SOLO el zip a la carpeta /public_html/api/
      - name: Deploy ZIP to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.PANEL_SERVER }}
          username: ${{ secrets.PANEL_USERNAME }}
          password: ${{ secrets.PANEL_PASSWORD }}
          port: 21
          local-dir: ./upload_dir/
          server-dir: /public_html/dev/v1/ # <-- Aquí cambias el destino

      # 5. Dispara la extracción en la nueva URL
      - name: Trigger unzip on server
        run: curl --fail "https://tucucompras.com.ar/dev/v1/extract.php?secret=${{ secrets.UNZIP_SECRET }}"